<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MainTab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container" style="border: yellow solid;">
         <div class="section" id="newsFeed" style="border: red solid;"></div>
         <div class="section" id="middleSpace" style="border: blue solid;">
            <div id="quote"></div>
            <div id="searchBar">
                <input id="searchInput" type="text" placeholder="Search...">
            </div>
            <div id="bookmarks">
            </div>
            <div>
                <button id="addBookmark">Add Bookmark</button>
            </div>
         </div>
         <div class="section" id="rightSpace" style="border: lime solid;">
           <div id="weatherFeed" style="border: coral solid;">
                <div id="currentForecast"></div>
                <div id="weeklyForecast"></div>
           </div>
           <div id="githubProfile">
                <img src="https://streak-stats.demolab.com?user=n0kira&theme=radical&date_format=j%20M%5B%20Y%5D&background=45%2C5A2B6C%2C2A052E" width="100%" alt="">
           </div>
         </div>   
    </div>

    <script src="script.js"></script>
</body>
</html>
